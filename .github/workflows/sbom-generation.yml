name: SBOM Generation and Security Scanning

on:
  push:
    branches: [ main, develop ]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
  pull_request:
    branches: [ main ]
    # Run SBOM only when dependency or code manifests change
    paths:
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'packages/**'
      - 'apps/**'
      - 'src/**'
  workflow_call:
    inputs:
      include_vulnerabilities:
        description: 'Include vulnerability scanning'
        required: false
        default: true
        type: boolean
    secrets:
      DEPENDENCY_TRACK_API_KEY:
        required: false
  workflow_dispatch:
    inputs:
      include_vulnerabilities:
        description: 'Include vulnerability scanning'
        required: false
        default: 'true'
        type: boolean
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sbom-generation:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'pull_request' || (!github.event.pull_request.head.repo.fork && contains(join(fromJSON(toJSON(github.event.pull_request.labels)).*.name, ','), 'run-security')) }}
    
    permissions:
      contents: read
      actions: read
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        persist-credentials: false
      
    - name: Setup Node + pnpm
      uses: ./.github/actions/setup-node-pnpm
      with:
        node-version: '20'
        
    - name: Install dependencies
      env:
        NPM_CONFIG_USERCONFIG: ${{ github.workspace }}/.npmrc
        NPM_CONFIG_GLOBALCONFIG: /dev/null
      run: pnpm install --frozen-lockfile
      
    - name: Build project
      run: pnpm run build
    
    - name: Bin smoke check
      run: node scripts/ci/check-bins.mjs
      
    - name: Generate SBOM (JSON format)
      env:
        INCLUDE_VULNS: ${{ inputs.include_vulnerabilities }}
        INCLUDE_VULNS_FALLBACK: ${{ github.event.inputs.include_vulnerabilities }}
      run: |
        INCLUDE="${INCLUDE_VULNS:-${INCLUDE_VULNS_FALLBACK:-true}}"
        EXTRA=""
        if [ "$INCLUDE" = "true" ]; then
          EXTRA="--include-vulns"
        fi
        pnpm run ae-framework sbom generate \
          --format json \
          --include-dev-deps \
          $EXTRA \
          --output sbom.json \
          --verbose
          
    - name: Generate SBOM (XML format)
      run: |
        pnpm run ae-framework sbom generate \
          --format xml \
          --output sbom.xml \
          --verbose
          
    - name: Validate SBOM
      run: |
        pnpm run ae-framework sbom validate sbom.json --verbose
        
    - name: Compare with previous SBOM (PR only)
      if: github.event_name == 'pull_request'
      run: |
        cp sbom.json sbom-current.json
        # Download previous SBOM from main branch if available
        if gh api repos/${{ github.repository }}/actions/artifacts --paginate \
           --jq '.artifacts[] | select(.name=="sbom-files") | select(.workflow_run.head_branch=="main") | .archive_download_url' \
           | head -1 | xargs -I {} gh api {} > previous-sbom.zip 2>/dev/null; then
          mkdir -p previous-sbom
          unzip -q previous-sbom.zip -d previous-sbom 2>/dev/null || true
          if [[ -f "previous-sbom/sbom.json" ]]; then
            pnpm run ae-framework sbom compare previous-sbom/sbom.json sbom-current.json --verbose || \
              printf -- "%s\n" "SBOM differences detected (non-blocking on PR compare step)"
          else
            printf -- "%s\n" "No previous SBOM payload found after download"
          fi
        else
          printf -- "%s\n" "No previous SBOM found for comparison"
        fi
        mv sbom-current.json sbom.json
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Write SBOM provenance
      run: |
        set -euo pipefail
        node scripts/ci/write-artifact-provenance.mjs \
          --output sbom-files.provenance.json \
          --artifact-name sbom-files \
          --subject sbom.json \
          --subject sbom.xml

    - name: Upload SBOM artifacts
      uses: actions/upload-artifact@v4
      with:
        name: sbom-files
        path: |
          sbom.json
          sbom.xml
          sbom-files.provenance.json
        retention-days: 14
        
    # Security scanning
    - name: Run dependency audit
      run: |
        set -euo pipefail
        ENFORCE=1
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          ENFORCE=0
          if jq -e '.pull_request.labels[]?.name | select(.=="enforce-security")' "$GITHUB_EVENT_PATH" >/dev/null; then
            ENFORCE=1
          fi
        fi

        set +e
        pnpm audit --audit-level=moderate --json > audit-results.json
        AUDIT_EXIT=$?
        set -e

        if ! jq -e '.metadata.vulnerabilities' audit-results.json >/dev/null 2>&1; then
          if [ "${ENFORCE}" = "1" ]; then
            printf "%s\n" "Dependency audit did not produce parseable vulnerability metadata."
            exit 1
          fi
          echo "::warning::Dependency audit did not produce parseable vulnerability metadata."
          printf '{"metadata":{"vulnerabilities":{}}}\n' > audit-results.json
          exit 0
        fi

        HIGH="$(jq -r '.metadata.vulnerabilities.high // 0' audit-results.json)"
        CRITICAL="$(jq -r '.metadata.vulnerabilities.critical // 0' audit-results.json)"
        printf "%s\n" "Dependency audit summary: high=${HIGH}, critical=${CRITICAL}, audit_exit=${AUDIT_EXIT}, enforce=${ENFORCE}"
        if [ "${HIGH}" -gt 0 ] || [ "${CRITICAL}" -gt 0 ]; then
          if [ "${ENFORCE}" = "1" ]; then
            printf "%s\n" "High-risk vulnerabilities found under enforced SBOM audit mode."
            exit 1
          fi
          echo "::warning::High/critical vulnerabilities detected (non-blocking without enforce-security label)."
        fi
        
    - name: Write security scan provenance
      run: |
        set -euo pipefail
        node scripts/ci/write-artifact-provenance.mjs \
          --output security-scan-results.provenance.json \
          --artifact-name security-scan-results \
          --subject audit-results.json

    - name: Upload security scan results
      uses: actions/upload-artifact@v4
      with:
        name: security-scan-results
        path: |
          audit-results.json
          security-scan-results.provenance.json
        retention-days: 14
        
  sbom-publication:
    runs-on: ubuntu-latest
    needs: sbom-generation
    if: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}

    permissions:
      contents: read
      actions: read

    steps:
    - name: Download SBOM artifacts
      uses: actions/download-artifact@v4
      with:
        name: sbom-files

    - name: Upload SBOM to GitHub's dependency graph
      uses: actions/upload-artifact@v4
      with:
        name: sbom-dependency-graph
        path: sbom.json

    # Optional: Upload to dependency tracking service
    - name: Upload to Dependency Track
      if: vars.DEPENDENCY_TRACK_URL
      env:
        DT_API_KEY: ${{ secrets.DEPENDENCY_TRACK_API_KEY }}
        DT_BASE_URL: ${{ vars.DEPENDENCY_TRACK_URL }}
        DT_ALLOWED_HOSTS: ${{ vars.DEPENDENCY_TRACK_ALLOWED_HOSTS }}
        DT_PROJECT_UUID: ${{ vars.DEPENDENCY_TRACK_PROJECT_UUID }}
      run: |
        validate_dependency_track_url() {
          node --input-type=module - "$DT_BASE_URL" "$DT_ALLOWED_HOSTS" <<'NODE'
        const [rawUrl, rawAllowedHosts] = process.argv.slice(2);
        const allowedHosts = new Set(String(rawAllowedHosts || '').split(/[\s,]+/).filter(Boolean).map((value) => {
          try {
            const parsed = new URL(value);
            return parsed.host.toLowerCase();
          } catch {
            return value.toLowerCase();
          }
        }));
        try {
          const url = new URL(rawUrl);
          if (url.protocol !== 'https:') throw new Error('Dependency Track URL must use HTTPS');
          if (url.username || url.password) throw new Error('Dependency Track URL must not contain userinfo');
          if (!url.hostname) throw new Error('Dependency Track URL must include a hostname');
          const hostname = url.hostname.toLowerCase();
          const host = url.host.toLowerCase();
          if (!allowedHosts.has(hostname) && !allowedHosts.has(host)) {
            throw new Error('Dependency Track host must be allowlisted via DEPENDENCY_TRACK_ALLOWED_HOSTS');
          }
        } catch (error) {
          const message = error instanceof Error ? error.message : String(error);
          console.error(`::error::${message}`);
          process.exit(1);
        }
        NODE
        }

        if [[ -n "$DT_API_KEY" && -n "$DT_BASE_URL" ]]; then
          validate_dependency_track_url
          printf -- "%s\n" "Uploading SBOM to Dependency Track..."
          DT_BOM_URL="${DT_BASE_URL%/}/api/v1/bom"
          
          # Upload to specific project if UUID is provided
          if [[ -n "$DT_PROJECT_UUID" ]]; then
            curl --fail --show-error --silent --proto '=https' --tlsv1.2 -X "PUT" "$DT_BOM_URL" \
              -H "X-API-Key: $DT_API_KEY" \
              -H "Content-Type: application/json" \
              -F "project=$DT_PROJECT_UUID" \
              -F "bom=@sbom.json"
          else
            # Auto-create project from SBOM metadata
            curl --fail --show-error --silent --proto '=https' --tlsv1.2 -X "PUT" "$DT_BOM_URL" \
              -H "X-API-Key: $DT_API_KEY" \
              -H "Content-Type: application/json" \
              -d @sbom.json
          fi
          
          printf -- "%s\n" "SBOM uploaded successfully to Dependency Track"
        else
          printf -- "%s\n" "Dependency Track credentials not configured, skipping upload"
        fi
        
  security-analysis:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'pull_request' || (!github.event.pull_request.head.repo.fork && contains(github.event.pull_request.labels.*.name, 'run-security')) }}
    continue-on-error: ${{ github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'ci-non-blocking') }}
    needs: sbom-generation

    permissions:
      contents: read
      actions: read
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        persist-credentials: false
      
    - name: Download SBOM artifacts
      uses: actions/download-artifact@v4
      continue-on-error: true
      with:
        name: sbom-files

    - name: Download security scan results
      uses: actions/download-artifact@v4
      continue-on-error: true
      with:
        name: security-scan-results
        
    # Generate security report
    - name: Generate security report
      run: |
        {
          printf -- "# Security Analysis Report\n"
          printf -- "\n"
          printf -- "Generated on: %s\n\n" "$(date)"
        } > security-report.md

        {
          printf -- "## SBOM Summary\n"
        } >> security-report.md
        if [[ -f "sbom.json" ]]; then
          {
            printf -- "- SBOM format: %s\n" "$(jq -r '.bomFormat' sbom.json)"
            printf -- "- Spec version: %s\n" "$(jq -r '.specVersion' sbom.json)"
            printf -- "- Components: %s\n" "$(jq '.components | length' sbom.json)"
            printf -- "- Dependencies: %s\n\n" "$(jq '.dependencies | length // 0' sbom.json)"

            printf -- "### Component Types\n"
            jq -r '.components | group_by(.type) | .[] | "\(length) \(.[0].type) components"' sbom.json
            printf -- "\n"

            # License summary (top licenses)
            printf -- "### Licenses (top)\n"
            jq -r '[.components[] | select(.licenses) | .licenses[]?.license?.name // .licenses[]?.expression] | group_by(.) | sort_by(-length) | .[] | "- \(length)x \(.[0])"' sbom.json | head -10 || true
            printf -- "\n"
          } >> security-report.md
        fi

        {
          printf -- "## Dependency Audit Results\n"
        } >> security-report.md
        if [[ -f "audit-results.json" ]]; then
          if jq -e '.vulnerabilities' audit-results.json > /dev/null 2>&1; then
            {
              printf -- "- Total vulnerabilities: %s\n" "$(jq '.metadata.vulnerabilities.total // 0' audit-results.json)"
              printf -- "- High severity: %s\n" "$(jq '.metadata.vulnerabilities.high // 0' audit-results.json)"
              printf -- "- Moderate severity: %s\n" "$(jq '.metadata.vulnerabilities.moderate // 0' audit-results.json)"
              printf -- "- Low severity: %s\n" "$(jq '.metadata.vulnerabilities.low // 0' audit-results.json)"
            } >> security-report.md
          else
            printf -- "- No vulnerabilities found\n" >> security-report.md
          fi
        fi
        printf -- "\n" >> security-report.md

        {
          printf -- "## Recommendations\n"
          printf -- "1. Review SBOM for unexpected dependencies\n"
          printf -- "2. Update vulnerable packages to latest versions\n"
          printf -- "3. Monitor for new vulnerabilities in dependencies\n"
          printf -- "4. Consider using dependency scanning tools in CI/CD\n"
        } >> security-report.md

    - name: Enforce security thresholds (optional)
      if: github.event_name == 'pull_request'
      run: |
        # Determine enforcement from labels
        ENFORCE=0
        if [ -f "$GITHUB_EVENT_PATH" ]; then
          if jq -e '.pull_request.labels[]?.name | select(.=="enforce-security")' "$GITHUB_EVENT_PATH" >/dev/null; then
            ENFORCE=1
          fi
        fi
        # Allow toggling via env
        if [ "${SECURITY_ENFORCE:-0}" = "1" ]; then ENFORCE=1; fi

        # Defaults (can be overridden by repo vars)
        MAX_HIGH=${{ vars.SECURITY_MAX_HIGH || 0 }}
        MAX_MODERATE=${{ vars.SECURITY_MAX_MODERATE || 2 }}

        if [ "$ENFORCE" = "1" ] && [ -f audit-results.json ]; then
          H=$(jq -r '.metadata.vulnerabilities.high // 0' audit-results.json)
          M=$(jq -r '.metadata.vulnerabilities.moderate // 0' audit-results.json)
          printf -- "Enforcing security thresholds: high<=%s moderate<=%s (found: high=%s moderate=%s)\n" "$MAX_HIGH" "$MAX_MODERATE" "$H" "$M"
          FAIL=0
          [ "$H" -gt "$MAX_HIGH" ] && FAIL=1
          [ "$M" -gt "$MAX_MODERATE" ] && FAIL=1
          if [ "$FAIL" = "1" ]; then
            printf -- "%s\n" "Security thresholds exceeded" >&2
            exit 1
          fi
        fi
        
    - name: Upload security report
      uses: actions/upload-artifact@v4
      with:
        name: security-analysis-report
        path: security-report.md
        retention-days: 30

  codeql-analysis:
    runs-on: ubuntu-latest
    needs: sbom-generation
    if: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}

    permissions:
      contents: read
      security-events: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        persist-credentials: false

    # CodeQL analysis for additional trusted-ref security scanning
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: javascript
        config: |
          paths-ignore:
            - api/public-types.d.ts
            - artifacts/**
            - examples/**
            - src/ui/components/generated/**

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3

  # Compliance and attestation (optional)
  compliance:
    runs-on: ubuntu-latest
    needs: sbom-generation
    if: github.ref == 'refs/heads/main'
    
    permissions:
      id-token: write
      contents: read
      attestations: write
    
    steps:
    - name: Download SBOM artifacts
      uses: actions/download-artifact@v4
      with:
        name: sbom-files
        
    # Generate attestation for SBOM
    - name: Generate SBOM attestation
      uses: actions/attest-build-provenance@v1
      with:
        subject-path: 'sbom.json'
        
    # Optional: Sign SBOM with Sigstore
    - name: Install Cosign
      uses: sigstore/cosign-installer@v3
      
    - name: Sign SBOM with Cosign
      env:
        COSIGN_EXPERIMENTAL: 1
      run: |
        cosign sign-blob --yes sbom.json --output-signature sbom.json.sig --output-certificate sbom.json.crt
        
    - name: Upload signed SBOM
      uses: actions/upload-artifact@v4
      with:
        name: signed-sbom
        path: |
          sbom.json.sig
          sbom.json.crt
        retention-days: 90
