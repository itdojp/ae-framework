name: Docs Doctest

on:
  pull_request:
    paths:
      - 'README.md'
      - 'docs/README.md'
      - 'docs/**'
      - 'scripts/doctest.ts'
      - 'scripts/docs/*.mjs'
      - 'scripts/docs/check-ci-doc-index-consistency.mjs'
      - 'scripts/ci/run-changed-doctest.mjs'
      - 'scripts/ci/check-docs-doctest-policy-sync.mjs'
      - '.github/workflows/docs-doctest.yml'
      - 'package.json'
      - 'pnpm-lock.yaml'
  push:
    branches: [main]
    paths:
      - 'README.md'
      - 'docs/README.md'
      - 'docs/**'
      - 'scripts/doctest.ts'
      - 'scripts/docs/*.mjs'
      - 'scripts/docs/check-ci-doc-index-consistency.mjs'
      - 'scripts/ci/run-changed-doctest.mjs'
      - 'scripts/ci/check-docs-doctest-policy-sync.mjs'
      - '.github/workflows/docs-doctest.yml'
      - 'package.json'
      - 'pnpm-lock.yaml'
  schedule:
    - cron: '0 4 * * 0'
  workflow_dispatch:
    inputs:
      full:
        description: 'Run full docs doctest (`docs/**/*.md`)'
        required: false
        default: false
        type: boolean

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  doctest-index:
    name: doctest-index
    if: ${{ github.event_name != 'schedule' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node + pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          node-version: '20'
      - name: Install dependencies
        # Required lane policy: detect lockfile drift immediately (no fallback install).
        run: pnpm install --frozen-lockfile --config.use-lockfile=true --config.package-lock=true
      - name: Validate docs-doctest policy sync
        run: node scripts/ci/check-docs-doctest-policy-sync.mjs
      - name: Check documentation consistency
        run: node scripts/docs/check-doc-consistency-all.mjs
      - name: Run doctest (README + docs index)
        env:
          DOCTEST_ENFORCE: '1'
        run: pnpm -s run test:doctest:index

      - name: Run doctest (changed markdown in PR)
        if: ${{ github.event_name == 'pull_request' }}
        env:
          DOCTEST_ENFORCE: '1'
        run: node scripts/ci/run-changed-doctest.mjs --base-sha "${{ github.event.pull_request.base.sha }}" --fetch-missing

  doctest-full:
    name: doctest-full
    if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.full) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node + pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          node-version: '20'
      - name: Install dependencies
        # Keep the same lockfile policy as PR lane to avoid drift between full/scheduled and PR checks.
        run: pnpm install --frozen-lockfile --config.use-lockfile=true --config.package-lock=true
      - name: Validate docs-doctest policy sync
        run: node scripts/ci/check-docs-doctest-policy-sync.mjs
      - name: Run full docs doctest
        env:
          DOCTEST_ENFORCE: '1'
        run: pnpm -s run test:doctest:full
