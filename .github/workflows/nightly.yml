name: Nightly Matrix
on:
  schedule:
    - cron: '15 19 * * *'   # 毎日 04:15 JST
  workflow_dispatch:
    inputs:
      mode:
        description: Select which nightly jobs to run.
        type: choice
        required: false
        default: all
        options:
          - all
          - matrix
          - monitor
          - perf

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: read-all
jobs:
  matrix-test:
    if: >-
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' &&
        (github.event.inputs.mode == 'all' || github.event.inputs.mode == 'matrix'))
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: [20, 22]
        kind: [unit, integration]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node + pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          node-version: ${{ matrix.node }}
      - run: pnpm install --frozen-lockfile || pnpm install --no-frozen-lockfile
      - run: pnpm run test:${{ matrix.kind }}
  perf:
    if: >-
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' &&
        (github.event.inputs.mode == 'all' || github.event.inputs.mode == 'perf'))
    uses: ./.github/workflows/ci-core.yml
    with:
      node-version: '22'
      run-script: test:perf

  monitor:
    if: >-
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' &&
        (github.event.inputs.mode == 'all' || github.event.inputs.mode == 'monitor'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node + pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          node-version: '20'
      - name: Install
        run: pnpm install --frozen-lockfile || pnpm install --no-frozen-lockfile
      - name: Build
        run: pnpm run build
      - name: Bin smoke check
        run: node scripts/ci/check-bins.mjs
      - name: Flake (30x)
        run: node dist/src/cli/index.js qa:flake --times 30 --timeoutMs 240000 --workers 50% --pattern "tests/**"
      - name: Bench (run set)
        run: |
          rm -f artifacts/bench.json artifacts/bench-ts-run*.json artifacts/bench-ts-runset.txt || true
          for i in 1 2; do
            AE_SEED=321 node dist/src/cli/index.js bench
            cp artifacts/bench.json "artifacts/bench-ts-run${i}.json"
          done
      - name: Build bench runset
        run: |
          node scripts/ci/bench-runset.mjs \
            --out artifacts/bench-ts-runset.txt \
            --min-runs 2 \
            artifacts/bench-ts-run*.json
      - name: Compare benches (<=5% tolerance)
        run: |
          RUNSET="$(cat artifacts/bench-ts-runset.txt)"
          IFS=',' read -r BENCH_1 BENCH_2 _ <<< "${RUNSET}"
          node scripts/ci/compare-bench.mjs "${BENCH_1}" "${BENCH_2}" 0.05
      - name: Generate bench-compare report (report-only)
        run: |
          RUNSET="$(cat artifacts/bench-ts-runset.txt)"
          node scripts/quality/bench-compare.mjs \
            --baseline "${RUNSET}" \
            --candidate ts-self="${RUNSET}" \
            --out-json artifacts/bench-compare.json \
            --out-md artifacts/bench-compare.md
      - name: Show nightly reproducibility summary
        run: |
          jq '{
            baselineReproducibility: .baseline.reproducibility,
            candidateReproducibility: .candidates[0].reproducibility
          }' artifacts/bench-compare.json
      - name: Replay smoke
        run: AE_RECORDER_MODE=replay node dist/src/cli/index.js agent:complete --prompt "Hello, ae!"
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nightly-artifacts
          path: artifacts/
          retention-days: 14
      - name: Notify Slack on failure
        if: failure() && env.SLACK_WEBHOOK != null
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_MESSAGE: |
            🚨 ${{ github.workflow }} failed on ${{ github.ref }}
            • run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
            • artifacts: (see workflow page)
          SLACK_COLOR: "#E01E5A"
