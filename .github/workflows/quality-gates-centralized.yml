name: Quality Gates
on:
  pull_request:
    # Run quality gates only when code paths change
    paths:
      - 'src/**'
      - 'packages/**'
      - 'apps/**'
      - 'tests/**'
      - 'configs/**'
      - 'scripts/**'
      - 'types/**'
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'packages/**'
      - 'apps/**'
      - 'tests/**'
      - '.github/workflows/quality-gates-centralized.yml'
      - '!docs/**'
      - '!**/*.md'
  workflow_call:
    # Allow reuse from other workflows (e.g., release)
    inputs:
      environment:
        required: false
        type: string
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions: read-all
# Lockfile drift should fail quality gates instead of mutating deps in CI.
jobs:
  integration:
    uses: ./.github/workflows/ci-core.yml
    with:
      node-version: '20'
      run-script: test:int
  types:
    uses: ./.github/workflows/ci-core.yml
    with:
      node-version: '20'
      run-script: types:check
  a11y:
    uses: ./.github/workflows/ci-core.yml
    with:
      node-version: '20'
      run-script: test:a11y
  coverage:
    uses: ./.github/workflows/ci-core.yml
    with:
      node-version: '20'
      run-script: test:coverage
  dod:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node + pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          node-version: '20'
      - run: pnpm install --frozen-lockfile --config.use-lockfile=true --config.package-lock=true
      - name: Run DoD composite gate
        # Keep pull-request DoD signals report-only so baseline security debt does not
        # leave non-required PR checks red. Push/main and workflow_call still enforce DoD.
        continue-on-error: ${{ github.event_name == 'pull_request' }}
        run: pnpm run quality:run -- --env=testing --gates=dod --sequential
      - name: Write quality report provenance
        if: ${{ always() }}
        run: |
          set -euo pipefail
          mapfile -t reports < <(find artifacts/quality/reports -name 'quality-report-*-latest.json' -type f | sort || true)
          if [ "${#reports[@]}" -eq 0 ]; then
            printf '%s\n' '::error::quality-gates-report did not contain a latest quality report for provenance binding.'
            exit 1
          fi
          args=(
            --output quality-gates-report.provenance.json
            --artifact-name quality-gates-report
            --root artifacts/quality/reports
          )
          for report in "${reports[@]}"; do
            args+=(--subject "${report#artifacts/quality/reports/}")
          done
          node scripts/ci/write-artifact-provenance.mjs "${args[@]}"
          mv quality-gates-report.provenance.json artifacts/quality/reports/quality-gates-report.provenance.json
      - name: Upload quality report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: quality-gates-report
          path: artifacts/quality/reports
          if-no-files-found: warn
  type-coverage:
    uses: ./.github/workflows/ci-core.yml
    with:
      node-version: '20'
      run-script: typecov
  type-coverage-report:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node + pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          node-version: '20'
      - name: Install deps
        run: pnpm install --frozen-lockfile --config.use-lockfile=true --config.package-lock=true
      - name: Run type-coverage
        id: typecov
        run: |
          set -e
          OUT=$(pnpm -s run typecov || true)
          printf "%s\n" "$OUT"
          # Extract last percentage like: "type coverage: 67.89%"
          PCT=$(printf "%s\n" "$OUT" | rg -o "type coverage:\s*[0-9.]+%" -n | tail -n1 | awk '{print $3}')
          printf "%s\n" "pct=$PCT" >> "$GITHUB_OUTPUT"
      - name: Comment type coverage on PR
        if: steps.typecov.outputs.pct != ''
        uses: actions/github-script@v7
        with:
          script: |
            const pct = '${{ steps.typecov.outputs.pct }}';
            const labels = (context.payload.pull_request?.labels || []).map(l => l.name);
            const enforcing = labels.includes('enforce-typecov');
            const threshold = enforcing ? '70%' : '65%';
            const status = enforcing ? 'enforced (label: enforce-typecov)' : 'report-only';
            const body = [
              '### Type Coverage',
              '',
              `Current type coverage: **${pct}**`,
              `Policy: **${status}**, Threshold: **${threshold}**`,
              '',
              'Docs: `docs/quality/type-coverage-policy.md`'
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
  type-coverage-threshold:
    if: github.event_name == 'pull_request' && contains(join(fromJSON(toJSON(github.event.pull_request.labels)).*.name, ','), 'enforce-typecov')
    uses: ./.github/workflows/ci-core.yml
    with:
      node-version: '20'
      run-script: typecov:check:70
  types-tests:
    uses: ./.github/workflows/ci-core.yml
    with:
      node-version: '20'
      run-script: test:types
