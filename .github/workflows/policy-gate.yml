name: Policy Gate

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, labeled, unlabeled, edited]
  pull_request_review:
    types: [submitted, edited, dismissed]
  workflow_run:
    workflows:
      - Verify Lite
      - Copilot Review Gate
      - Security Analysis
      - testing-ddd-scripts
      - Context Pack Quality Gate
      - Spec Validation
      - Spec Generate & Model Tests
      - Full CI (Comprehensive Testing)
    types: [completed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to evaluate (manual run)'
        required: false
        type: number

concurrency:
  # Separate PR/review/manual runs from workflow_run fan-out so required PR checks are not cancelled.
  group: policy-gate-${{ github.event_name == 'workflow_run' && format('wr-{0}', github.event.workflow_run.pull_requests[0].number || github.event.workflow_run.id) || format('pr-{0}', github.event.pull_request.number || github.event.pull_request_review.pull_request.number || inputs.pr_number || github.ref) }}
  # Keep PR/review/manual evaluations stable; coalesce workflow_run fan-out to the latest run only.
  cancel-in-progress: ${{ github.event_name == 'workflow_run' }}

permissions:
  actions: read
  contents: read
  pull-requests: write
  issues: write

jobs:
  policy-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node + pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          node-version: '20'

      - name: Resolve automation config
        env:
          AE_AUTOMATION_PROFILE: ${{ vars.AE_AUTOMATION_PROFILE || '' }}
          AE_AUTOMATION_GLOBAL_DISABLE: ${{ vars.AE_AUTOMATION_GLOBAL_DISABLE || '' }}
          AE_COPILOT_AUTO_FIX: ${{ vars.AE_COPILOT_AUTO_FIX || '' }}
          AE_COPILOT_AUTO_FIX_SCOPE: ${{ vars.AE_COPILOT_AUTO_FIX_SCOPE || '' }}
          AE_COPILOT_AUTO_FIX_LABEL: ${{ vars.AE_COPILOT_AUTO_FIX_LABEL || '' }}
          AE_AUTO_MERGE: ${{ vars.AE_AUTO_MERGE || '' }}
          AE_AUTO_MERGE_MODE: ${{ vars.AE_AUTO_MERGE_MODE || '' }}
          AE_AUTO_MERGE_LABEL: ${{ vars.AE_AUTO_MERGE_LABEL || '' }}
          AE_AUTO_MERGE_REQUIRE_RISK_LOW: ${{ vars.AE_AUTO_MERGE_REQUIRE_RISK_LOW || '' }}
          AE_AUTO_MERGE_REQUIRE_CHANGE_PACKAGE: ${{ vars.AE_AUTO_MERGE_REQUIRE_CHANGE_PACKAGE || '' }}
          AE_AUTO_MERGE_CHANGE_PACKAGE_ALLOW_WARN: ${{ vars.AE_AUTO_MERGE_CHANGE_PACKAGE_ALLOW_WARN || '' }}
          AE_GH_THROTTLE_MS: ${{ vars.AE_GH_THROTTLE_MS || '' }}
          AE_GH_RETRY_MAX_ATTEMPTS: ${{ vars.AE_GH_RETRY_MAX_ATTEMPTS || '' }}
          AE_GH_RETRY_INITIAL_DELAY_MS: ${{ vars.AE_GH_RETRY_INITIAL_DELAY_MS || '' }}
          AE_GH_RETRY_MAX_DELAY_MS: ${{ vars.AE_GH_RETRY_MAX_DELAY_MS || '' }}
          AE_GH_RETRY_MULTIPLIER: ${{ vars.AE_GH_RETRY_MULTIPLIER || '' }}
          AE_GH_RETRY_JITTER_MS: ${{ vars.AE_GH_RETRY_JITTER_MS || '' }}
          AE_GH_RETRY_DEBUG: ${{ vars.AE_GH_RETRY_DEBUG || '' }}
          AE_REVIEW_TOPOLOGY: ${{ vars.AE_REVIEW_TOPOLOGY || '' }}
          AE_POLICY_MIN_HUMAN_APPROVALS: ${{ vars.AE_POLICY_MIN_HUMAN_APPROVALS || '' }}
          COPILOT_REVIEW_WAIT_MINUTES: ${{ vars.COPILOT_REVIEW_WAIT_MINUTES || '' }}
          COPILOT_REVIEW_MAX_ATTEMPTS: ${{ vars.COPILOT_REVIEW_MAX_ATTEMPTS || '' }}
        run: |
          node scripts/ci/lib/automation-config.mjs --format github-env >> "$GITHUB_ENV"
          node scripts/ci/lib/automation-config.mjs --format summary >> "$GITHUB_STEP_SUMMARY"

      - name: Install dependencies
        # policy-gate is merge-blocking; keep install path deterministic.
        env:
          NPM_CONFIG_USERCONFIG: ${{ github.workspace }}/.npmrc
          NPM_CONFIG_GLOBALCONFIG: /dev/null
        run: pnpm install --frozen-lockfile --config.use-lockfile=true --config.package-lock=true

      - name: Resolve PR number
        id: pr
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          PR_NUMBER="${{ github.event.pull_request.number || github.event.pull_request_review.pull_request.number || inputs.pr_number || '' }}"
          PR_HEAD_SHA="${{ github.event.pull_request.head.sha || github.event.pull_request_review.pull_request.head.sha || github.event.workflow_run.head_sha || '' }}"
          PR_BASE_SHA="${{ github.event.pull_request.base.sha || github.event.pull_request_review.pull_request.base.sha || '' }}"
          PR_HEAD_REPOSITORY="${{ github.event.pull_request.head.repo.full_name || github.event.pull_request_review.pull_request.head.repo.full_name || github.event.workflow_run.head_repository.full_name || '' }}"
          PR_BASE_REPOSITORY="${{ github.event.pull_request.base.repo.full_name || github.event.pull_request_review.pull_request.base.repo.full_name || github.repository }}"
          if [ -z "${PR_NUMBER}" ] && [ "${{ github.event_name }}" = "workflow_run" ]; then
            PR_NUMBER="$(jq -r '.workflow_run.pull_requests[0].number // ""' "$GITHUB_EVENT_PATH")"
          fi
          if [ -z "${PR_NUMBER}" ]; then
            {
              printf '%s\n' 'skip=true'
              printf '%s\n' 'pr_number='
              printf '%s\n' 'head_sha='
              printf '%s\n' 'base_sha='
              printf '%s\n' 'head_repository='
              printf '%s\n' 'base_repository='
            } >> "$GITHUB_OUTPUT"
            printf '%s\n' 'Policy Gate skipped: no PR context for this event.' >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          if [ -z "${PR_HEAD_SHA}" ] || [ -z "${PR_BASE_SHA}" ] || [ -z "${PR_HEAD_REPOSITORY}" ] || [ -z "${PR_BASE_REPOSITORY}" ]; then
            pr_json="$(gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}" 2>/dev/null || printf '{}')"
            if [ -z "${PR_HEAD_SHA}" ]; then
              PR_HEAD_SHA="$(jq -r '.head.sha // ""' <<<"${pr_json}")"
            fi
            if [ -z "${PR_BASE_SHA}" ]; then
              PR_BASE_SHA="$(jq -r '.base.sha // ""' <<<"${pr_json}")"
            fi
            if [ -z "${PR_HEAD_REPOSITORY}" ]; then
              PR_HEAD_REPOSITORY="$(jq -r '.head.repo.full_name // ""' <<<"${pr_json}")"
            fi
            if [ -z "${PR_BASE_REPOSITORY}" ]; then
              PR_BASE_REPOSITORY="$(jq -r '.base.repo.full_name // ""' <<<"${pr_json}")"
            fi
          fi
          PR_HEAD_REPOSITORY="${PR_HEAD_REPOSITORY:-${GITHUB_REPOSITORY}}"
          PR_BASE_REPOSITORY="${PR_BASE_REPOSITORY:-${GITHUB_REPOSITORY}}"
          {
            printf '%s\n' "skip=false"
            printf '%s\n' "pr_number=${PR_NUMBER}"
            printf '%s\n' "head_sha=${PR_HEAD_SHA}"
            printf '%s\n' "base_sha=${PR_BASE_SHA}"
            printf '%s\n' "head_repository=${PR_HEAD_REPOSITORY}"
            printf '%s\n' "base_repository=${PR_BASE_REPOSITORY}"
          } >> "$GITHUB_OUTPUT"

      - name: Resolve assurance policy inputs
        if: ${{ steps.pr.outputs.skip != 'true' }}
        id: assurance-policy
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
          AE_POLICY_ASSURANCE_MODE_CONFIG: ${{ vars.AE_POLICY_ASSURANCE_MODE || '' }}
        with:
          script: |
            const crypto = require('crypto');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = Number(process.env.PR_NUMBER || 0);
            const explicitMode = String(process.env.AE_POLICY_ASSURANCE_MODE_CONFIG || '').trim();

            if (explicitMode) {
              core.exportVariable('AE_POLICY_ASSURANCE_MODE', explicitMode);
            }
            core.setOutput('verify_lite_run_id', '');

            if (!prNumber) {
              return;
            }

            const { data: pr } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: prNumber,
            });
            const labels = new Set((pr.labels || []).map((label) => label.name));
            const explicitStrict = ['strict', 'enforcement', 'enforced'].includes(explicitMode.toLowerCase());
            const labelStrict = labels.has('enforce-assurance');
            if (!explicitStrict && !labelStrict) {
              return;
            }

            const { data } = await github.rest.actions.listWorkflowRuns({
              owner,
              repo,
              workflow_id: 'verify-lite.yml',
              event: 'pull_request',
              head_sha: pr.head.sha,
              status: 'completed',
              per_page: 10,
            });
            const run = (data.workflow_runs || []).find((candidate) =>
              candidate.head_sha === pr.head.sha
              && candidate.conclusion === 'success'
            );
            if (!run) {
              if (labelStrict && !explicitStrict) {
                core.notice('enforce-assurance label is present, but no successful Verify Lite artifact exists for this head yet; policy-gate remains report-only until workflow_run re-evaluation.');
              } else {
                core.warning('Strict assurance mode is configured, but no successful Verify Lite artifact exists for this head; policy-gate will fail closed if the assurance artifact is missing.');
              }
              return;
            }

            async function exportTrustedDigest(envName, path) {
              try {
                const response = await github.rest.repos.getContent({
                  owner,
                  repo,
                  path,
                  ref: pr.base.sha,
                });
                const content = response.data;
                if (Array.isArray(content) || content.type !== 'file' || typeof content.content !== 'string') {
                  core.warning(`Trusted provenance digest skipped for ${path}: content is not a file`);
                  return;
                }
                const encoding = content.encoding === 'base64' ? 'base64' : 'utf8';
                const digest = crypto
                  .createHash('sha256')
                  .update(Buffer.from(content.content, encoding))
                  .digest('hex');
                core.exportVariable(envName, digest);
              } catch (error) {
                core.warning(`Trusted provenance digest skipped for ${path}: ${error instanceof Error ? error.message : String(error)}`);
              }
            }

            core.setOutput('verify_lite_run_id', String(run.id));
            core.exportVariable('AE_VERIFY_LITE_RUN_ID', String(run.id));
            core.exportVariable('AE_VERIFY_LITE_RUN_ATTEMPT', String(run.run_attempt || ''));
            core.exportVariable('AE_VERIFY_LITE_HEAD_SHA', pr.head.sha);
            core.exportVariable('AE_VERIFY_LITE_WORKFLOW_NAME', run.name || 'Verify Lite');
            core.exportVariable('AE_VERIFY_LITE_EVENT_NAME', run.event || 'pull_request');
            core.exportVariable('AE_VERIFY_LITE_CONCLUSION', run.conclusion || '');
            core.exportVariable('AE_VERIFY_LITE_REPOSITORY', `${owner}/${repo}`);
            core.exportVariable('AE_VERIFY_LITE_TRUSTED_REF', pr.base.sha);
            await exportTrustedDigest(
              'AE_VERIFY_LITE_TRUSTED_GENERATOR_SHA256',
              'scripts/assurance/build-claim-evidence-manifest.mjs',
            );
            await exportTrustedDigest(
              'AE_VERIFY_LITE_TRUSTED_SCHEMA_SHA256',
              'schema/claim-evidence-manifest.schema.json',
            );
            await exportTrustedDigest(
              'AE_VERIFY_LITE_TRUSTED_CONTRACT_SHA256',
              'scripts/ci/lib/claim-evidence-manifest-contract.mjs',
            );
            if (labelStrict && !explicitMode) {
              core.exportVariable('AE_POLICY_ASSURANCE_MODE', 'strict');
            }

      - name: Download verify-lite assurance artifacts
        if: ${{ steps.assurance-policy.outputs.verify_lite_run_id != '' }}
        uses: actions/download-artifact@v4
        with:
          name: verify-lite-report
          path: artifacts
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ steps.assurance-policy.outputs.verify_lite_run_id }}

      - name: Run risk labeler
        if: ${{ steps.pr.outputs.skip != 'true' && github.event_name != 'workflow_run' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
        run: node scripts/ci/risk-labeler.mjs

      - name: Evaluate policy gate
        if: ${{ steps.pr.outputs.skip != 'true' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
        run: node scripts/ci/policy-gate.mjs

      - name: Validate policy-gate summary schema
        if: ${{ always() && steps.pr.outputs.skip != 'true' }}
        run: |
          node scripts/ci/validate-policy-gate-summary.mjs \
            artifacts/ci/policy-gate-summary.json \
            schema/policy-gate-summary-v1.schema.json

      - name: Setup OPA (shadow mode)
        if: ${{ always() && steps.pr.outputs.skip != 'true' }}
        continue-on-error: true
        uses: open-policy-agent/setup-opa@v2

      - name: Policy shadow compare (JS vs OPA)
        if: ${{ always() && steps.pr.outputs.skip != 'true' }}
        env:
          AE_POLICY_ENGINE_MODE: ${{ vars.AE_POLICY_ENGINE_MODE || 'shadow' }}
        run: |
          set -euo pipefail
          node scripts/ci/policy-shadow-compare.mjs --mode "${AE_POLICY_ENGINE_MODE}"

      - name: Write policy-gate artifact provenance
        if: ${{ always() && steps.pr.outputs.skip != 'true' }}
        env:
          AE_ARTIFACT_PROVENANCE_PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
          AE_ARTIFACT_PROVENANCE_HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
          AE_ARTIFACT_PROVENANCE_BASE_SHA: ${{ steps.pr.outputs.base_sha }}
          AE_ARTIFACT_PROVENANCE_HEAD_REPOSITORY: ${{ steps.pr.outputs.head_repository }}
          AE_ARTIFACT_PROVENANCE_BASE_REPOSITORY: ${{ steps.pr.outputs.base_repository }}
        run: |
          set -euo pipefail
          subjects=()
          for required in \
            artifacts/ci/policy-gate-summary.json \
            artifacts/ci/policy-gate-summary.md \
            artifacts/ci/policy-input-v1.json \
            artifacts/ci/policy-decision-js-v1.json
          do
            if [ ! -f "$required" ]; then
              printf '%s\n' "::warning::Policy Gate artifact provenance skipped because $required is missing."
              exit 0
            fi
            subjects+=(--subject "${required#artifacts/}")
          done
          for optional in \
            artifacts/ci/policy-decision-opa-v1.json \
            artifacts/ci/policy-shadow-compare-v1.json
          do
            if [ -f "$optional" ]; then
              subjects+=(--subject "${optional#artifacts/}")
            fi
          done
          node scripts/ci/write-artifact-provenance.mjs \
            --output artifacts/ci/policy-gate.provenance.json \
            --artifact-name policy-gate-artifacts \
            --root artifacts \
            "${subjects[@]}"

      - name: Validate policy-gate artifact provenance
        if: ${{ always() && steps.pr.outputs.skip != 'true' }}
        env:
          PR_HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
          PR_BASE_SHA: ${{ steps.pr.outputs.base_sha }}
          PR_HEAD_REPOSITORY: ${{ steps.pr.outputs.head_repository }}
          PR_BASE_REPOSITORY: ${{ steps.pr.outputs.base_repository }}
        run: |
          set -euo pipefail
          if [ ! -f artifacts/ci/policy-gate.provenance.json ]; then
            printf '%s\n' '::warning::Policy Gate artifact provenance is missing; earlier policy-gate step likely failed before producing decision artifacts.'
            exit 0
          fi
          args=(
            --provenance artifacts/ci/policy-gate.provenance.json
            --root artifacts
            --artifact-name policy-gate-artifacts
            --repository "${GITHUB_REPOSITORY}"
            --workflow "Policy Gate"
            --workflow-ref-prefix "${GITHUB_REPOSITORY}/.github/workflows/policy-gate.yml@"
            --run-id "${GITHUB_RUN_ID}"
            --run-attempt "${GITHUB_RUN_ATTEMPT}"
            --event-name "${GITHUB_EVENT_NAME}"
            --pr-number "${{ steps.pr.outputs.pr_number }}"
            --require-subject ci/policy-gate-summary.json
            --require-subject ci/policy-input-v1.json
            --require-subject ci/policy-decision-js-v1.json
          )
          if [ -n "${PR_HEAD_SHA}" ]; then
            args+=(--head-sha "${PR_HEAD_SHA}")
          fi
          if [ -n "${PR_BASE_SHA}" ]; then
            args+=(--base-sha "${PR_BASE_SHA}")
          fi
          if [ -n "${PR_HEAD_REPOSITORY}" ]; then
            args+=(--head-repository "${PR_HEAD_REPOSITORY}")
          fi
          if [ -n "${PR_BASE_REPOSITORY}" ]; then
            args+=(--base-repository "${PR_BASE_REPOSITORY}")
          fi
          node scripts/ci/validate-artifact-provenance.mjs "${args[@]}"
      - name: Upload policy artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: policy-gate-artifacts
          path: |
            artifacts/plan/plan-artifact.json
            artifacts/plan/plan-artifact.md
            artifacts/plan/plan-artifact-validation.json
            artifacts/plan/plan-artifact-validation.md
            artifacts/ci/risk-labeler-summary.json
            artifacts/ci/risk-labeler-summary.md
            artifacts/ci/policy-gate-summary.json
            artifacts/ci/policy-gate-summary.md
            artifacts/ci/policy-gate.provenance.json
            artifacts/ci/policy-input-v1.json
            artifacts/ci/policy-decision-js-v1.json
            artifacts/ci/policy-decision-opa-v1.json
            artifacts/ci/policy-shadow-compare-v1.json
          if-no-files-found: warn
