name: Assurance Gate Cache Comparison

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  SAMPLE_COUNT_PER_MODE: 5

jobs:
  seed-cache:
    name: seed-exact-pnpm-store-cache
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          path: .benchmark-action
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Create external-style pass fixture
        shell: bash
        run: |
          mkdir -p artifacts
          cat > artifacts/evidence.json <<'JSON'
          {
            "evidence": [
              {
                "claimId": "minimal-assurance-gate-reviewable",
                "lane": "spec",
                "kind": "schema",
                "sourceKind": "spec-derived",
                "origin": "cache-comparison-fixture"
              },
              {
                "claimId": "minimal-assurance-gate-reviewable",
                "lane": "behavior",
                "kind": "integration",
                "sourceKind": "runtime-derived",
                "origin": "cache-comparison-fixture"
              }
            ],
            "policyEvidence": ["postDeployVerify", "qualityGates"]
          }
          JSON
      - name: Seed exact dependency cache
        uses: ./.benchmark-action
        with:
          profile: minimal
          artifacts-dir: artifacts
          output-dir: artifacts/assurance-gate
          fail-on-block: "true"
          dependency-cache: "true"

  cache-miss:
    name: cache-miss-sample-${{ matrix.index }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        index: [1, 2, 3, 4, 5]
    steps:
      - uses: actions/checkout@v4
        with:
          path: .benchmark-action
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Create external-style pass fixture
        shell: bash
        run: |
          mkdir -p artifacts
          cat > artifacts/evidence.json <<'JSON'
          {
            "evidence": [
              {
                "claimId": "minimal-assurance-gate-reviewable",
                "lane": "spec",
                "kind": "schema",
                "sourceKind": "spec-derived",
                "origin": "cache-comparison-fixture"
              },
              {
                "claimId": "minimal-assurance-gate-reviewable",
                "lane": "behavior",
                "kind": "integration",
                "sourceKind": "runtime-derived",
                "origin": "cache-comparison-fixture"
              }
            ],
            "policyEvidence": ["postDeployVerify", "qualityGates"]
          }
          JSON
      - name: Mark action start
        id: start
        shell: bash
        run: printf '%s\n' "started_ms=$(date +%s%3N)" >> "$GITHUB_OUTPUT"
      - name: Run action with dependency cache disabled
        id: assurance
        continue-on-error: true
        # pnpm 10 maps NPM_CONFIG_STORE_DIR to the store-dir setting. The
        # repository's PNPM_STORE_PATH convention is a shell variable and does
        # not change pnpm's store unless a caller also passes --store-dir.
        env:
          NPM_CONFIG_STORE_DIR: ${{ runner.temp }}/assurance-gate-cache-miss-${{ matrix.index }}
        uses: ./.benchmark-action
        with:
          profile: minimal
          artifacts-dir: artifacts
          output-dir: artifacts/assurance-gate
          fail-on-block: "false"
          dependency-cache: "false"
      - name: Write cache-miss sample
        if: ${{ always() }}
        shell: bash
        env:
          STARTED_MS: ${{ steps.start.outputs.started_ms }}
          SAMPLE_INDEX: ${{ matrix.index }}
          STEP_OUTCOME: ${{ steps.assurance.outcome }}
          GATE_RESULT: ${{ steps.assurance.outputs.gate-result }}
          CACHE_HIT: ${{ steps.assurance.outputs.dependency-cache-hit }}
          CACHE_KEY: ${{ steps.assurance.outputs.dependency-cache-key }}
          PNPM_VERSION: ${{ steps.assurance.outputs.pnpm-version }}
        run: |
          mkdir -p sample
          node <<'NODE'
          const fs = require('node:fs');
          const { execFileSync } = require('node:child_process');
          const version = (command) => {
            try {
              return execFileSync(command, ['--version'], { encoding: 'utf8' }).trim();
            } catch {
              return 'unavailable';
            }
          };
          const completedMs = Date.now();
          const outcome = process.env.STEP_OUTCOME || 'failure';
          const report = {
            mode: 'cache-miss',
            index: Number(process.env.SAMPLE_INDEX),
            exactRef: process.env.GITHUB_SHA,
            durationMs: completedMs - Number(process.env.STARTED_MS),
            result: process.env.GATE_RESULT || 'error',
            stepOutcome: outcome,
            cacheEnabled: false,
            cacheHit: process.env.CACHE_HIT === 'true',
            cacheKey: process.env.CACHE_KEY || 'unavailable',
            environment: {
              runnerOs: process.env.RUNNER_OS,
              architecture: process.env.RUNNER_ARCH,
              runnerImage: `${process.env.ImageOS || 'ubuntu'}-${process.env.ImageVersion || 'unknown'}`,
              nodeVersion: process.version,
              npmVersion: version('npm'),
              pnpmVersion: process.env.PNPM_VERSION || 'unavailable',
            },
          };
          fs.writeFileSync('sample/sample.json', `${JSON.stringify(report, null, 2)}\n`);
          NODE
      - name: Upload cache-miss sample
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: assurance-gate-cache-sample-miss-${{ matrix.index }}
          path: sample/sample.json
          if-no-files-found: error

  cache-hit:
    name: cache-hit-sample-${{ matrix.index }}
    needs: seed-cache
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        index: [1, 2, 3, 4, 5]
    steps:
      - uses: actions/checkout@v4
        with:
          path: .benchmark-action
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Create external-style pass fixture
        shell: bash
        run: |
          mkdir -p artifacts
          cat > artifacts/evidence.json <<'JSON'
          {
            "evidence": [
              {
                "claimId": "minimal-assurance-gate-reviewable",
                "lane": "spec",
                "kind": "schema",
                "sourceKind": "spec-derived",
                "origin": "cache-comparison-fixture"
              },
              {
                "claimId": "minimal-assurance-gate-reviewable",
                "lane": "behavior",
                "kind": "integration",
                "sourceKind": "runtime-derived",
                "origin": "cache-comparison-fixture"
              }
            ],
            "policyEvidence": ["postDeployVerify", "qualityGates"]
          }
          JSON
      - name: Mark action start
        id: start
        shell: bash
        run: printf '%s\n' "started_ms=$(date +%s%3N)" >> "$GITHUB_OUTPUT"
      - name: Run action with exact dependency cache
        id: assurance
        continue-on-error: true
        uses: ./.benchmark-action
        with:
          profile: minimal
          artifacts-dir: artifacts
          output-dir: artifacts/assurance-gate
          fail-on-block: "false"
          dependency-cache: "true"
      - name: Write cache-hit sample
        if: ${{ always() }}
        shell: bash
        env:
          STARTED_MS: ${{ steps.start.outputs.started_ms }}
          SAMPLE_INDEX: ${{ matrix.index }}
          STEP_OUTCOME: ${{ steps.assurance.outcome }}
          GATE_RESULT: ${{ steps.assurance.outputs.gate-result }}
          CACHE_HIT: ${{ steps.assurance.outputs.dependency-cache-hit }}
          CACHE_KEY: ${{ steps.assurance.outputs.dependency-cache-key }}
          PNPM_VERSION: ${{ steps.assurance.outputs.pnpm-version }}
        run: |
          mkdir -p sample
          node <<'NODE'
          const fs = require('node:fs');
          const { execFileSync } = require('node:child_process');
          const version = (command) => {
            try {
              return execFileSync(command, ['--version'], { encoding: 'utf8' }).trim();
            } catch {
              return 'unavailable';
            }
          };
          const completedMs = Date.now();
          const outcome = process.env.STEP_OUTCOME || 'failure';
          const report = {
            mode: 'cache-hit',
            index: Number(process.env.SAMPLE_INDEX),
            exactRef: process.env.GITHUB_SHA,
            durationMs: completedMs - Number(process.env.STARTED_MS),
            result: process.env.GATE_RESULT || 'error',
            stepOutcome: outcome,
            cacheEnabled: true,
            cacheHit: process.env.CACHE_HIT === 'true',
            cacheKey: process.env.CACHE_KEY || 'unavailable',
            environment: {
              runnerOs: process.env.RUNNER_OS,
              architecture: process.env.RUNNER_ARCH,
              runnerImage: `${process.env.ImageOS || 'ubuntu'}-${process.env.ImageVersion || 'unknown'}`,
              nodeVersion: process.version,
              npmVersion: version('npm'),
              pnpmVersion: process.env.PNPM_VERSION || 'unavailable',
            },
          };
          fs.writeFileSync('sample/sample.json', `${JSON.stringify(report, null, 2)}\n`);
          NODE
      - name: Upload cache-hit sample
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: assurance-gate-cache-sample-hit-${{ matrix.index }}
          path: sample/sample.json
          if-no-files-found: error

  aggregate:
    name: cache-comparison-report-only
    if: ${{ always() }}
    needs: [seed-cache, cache-miss, cache-hit]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Setup Node + pnpm for report validation
        uses: ./.github/actions/setup-node-pnpm
        with:
          node-version: "20"
      - name: Install validation dependencies
        env:
          NPM_CONFIG_USERCONFIG: ${{ github.workspace }}/.npmrc
          NPM_CONFIG_GLOBALCONFIG: /dev/null
        run: pnpm install --frozen-lockfile --config.use-lockfile=true --config.package-lock=true
      - name: Download cache samples
        uses: actions/download-artifact@v4
        with:
          pattern: assurance-gate-cache-sample-*
          path: artifacts/benchmarks/cache-samples
      - name: Build and validate cache comparison
        run: |
          node scripts/actions/summarize-assurance-gate-cache-comparison.mjs \
            --input-dir=artifacts/benchmarks/cache-samples \
            --exact-ref="${GITHUB_SHA}" \
            --workflow-run-id="${GITHUB_RUN_ID}"
          pnpm -s exec vitest run tests/scripts/assurance-gate-cache-comparison.test.ts --reporter dot
      - name: Append comparison summary
        if: ${{ always() }}
        run: |
          if [ -f artifacts/benchmarks/assurance-gate-cache-comparison.md ]; then
            cat artifacts/benchmarks/assurance-gate-cache-comparison.md >> "$GITHUB_STEP_SUMMARY"
          else
            printf '%s\n' 'Cache comparison report was not generated.' >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Upload cache comparison
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: assurance-gate-cache-comparison-${{ github.run_id }}
          path: |
            artifacts/benchmarks/assurance-gate-cache-comparison.json
            artifacts/benchmarks/assurance-gate-cache-comparison.md
          if-no-files-found: error
