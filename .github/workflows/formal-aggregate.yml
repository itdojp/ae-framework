name: Formal Reports Aggregate

on:
  workflow_call:
    inputs:
      source_run_id:
        description: "Workflow run id to download artifacts from"
        required: false
        type: string
      strict_formal_summary_v1:
        description: "Fail the workflow if Formal Summary v1 is missing/invalid"
        required: false
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      source_run_id:
        description: "Workflow run id to download artifacts from"
        required: false
        type: string
      strict_formal_summary_v1:
        description: "Fail the workflow if Formal Summary v1 is missing/invalid"
        required: false
        type: boolean
        default: false
concurrency:
  group: ${{ github.workflow }}-${{ inputs.source_run_id || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  aggregate:
    # Reusable workflows retain the caller event name, so a pull_request caller
    # must not be gated on `github.event_name == 'workflow_call'` here.
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    continue-on-error: ${{ inputs.strict_formal_summary_v1 != true }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Setup Node + pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          node-version: '20'
      - name: Install dependencies
        # Summary generation and provenance validation import AJV. Keep this
        # label-gated evidence path deterministic and fail on lockfile drift.
        run: pnpm install --frozen-lockfile --config.use-lockfile=true --config.package-lock=true
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts_dl
          run-id: ${{ inputs.source_run_id != '' && inputs.source_run_id || github.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN || github.token }}
      - name: Aggregate formal reports
        id: agg
        # Requires actions/checkout: runs a repository script.
        run: |
          node scripts/formal/aggregate-formal-reports.mjs
      - name: Generate Formal Summary v1 (non-blocking)
        if: always()
        continue-on-error: ${{ inputs.strict_formal_summary_v1 != true }}
        run: |
          node scripts/formal/generate-formal-summary-v1.mjs --in artifacts_dl --out artifacts/formal/formal-summary-v1.json --out-v2 artifacts/formal/formal-summary-v2.json
      - name: Write formal aggregate provenance
        if: always()
        run: |
          set -euo pipefail
          subjects=()
          for subject in formal-aggregate.md formal-aggregate.json; do
            if [ -f "artifacts/formal/$subject" ]; then
              subjects+=(--subject "$subject")
            fi
          done
          if [ "${#subjects[@]}" -eq 0 ]; then
            printf '%s\n' '::error::formal aggregate artifact has no subjects to bind.'
            exit 1
          fi
          node scripts/ci/write-artifact-provenance.mjs \
            --output artifacts/formal/formal-reports-aggregate.provenance.json \
            --artifact-name formal-reports-aggregate \
            --root artifacts/formal \
            "${subjects[@]}"
      - name: Upload aggregate
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: formal-reports-aggregate
          path: |
            artifacts/formal/formal-aggregate.md
            artifacts/formal/formal-aggregate.json
            artifacts/formal/formal-reports-aggregate.provenance.json
      - name: Upload aggregate JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: formal-reports-aggregate-json
          path: artifacts/formal/formal-aggregate.json
      - name: Upload Formal Summary v1 JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: formal-summary-v1
          path: artifacts/formal/formal-summary-v1.json
      - name: Upload Formal Summary v2 JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: formal-summary-v2
          path: artifacts/formal/formal-summary-v2.json
      - name: Validate Formal Summary v1 JSON (non-blocking)
        if: always()
        run: |
          node scripts/ci/validate-formal-summary-v1.mjs artifacts/formal/formal-summary-v1.json schema/formal-summary-v1.schema.json || true
      - name: Validate Formal Summary v2 JSON (non-blocking)
        if: always()
        run: |
          node scripts/ci/validate-formal-summary-v2.mjs artifacts/formal/formal-summary-v2.json schema/formal-summary-v2.schema.json || true
      - name: Enforce Formal Summary v1 JSON (strict)
        if: inputs.strict_formal_summary_v1 == true
        run: |
          node scripts/ci/validate-formal-summary-v1.mjs --require artifacts/formal/formal-summary-v1.json schema/formal-summary-v1.schema.json
          node scripts/ci/validate-formal-summary-v2.mjs --require artifacts/formal/formal-summary-v2.json schema/formal-summary-v2.schema.json
      - name: Validate aggregate JSON (non-blocking)
        if: always()
        run: |
          node scripts/formal/validate-aggregate-json.mjs || true
      - name: Validate conformance summary (non-blocking)
        if: always()
        run: |
          node scripts/formal/validate-conformance-summary.mjs || true
      # PR comment publication is intentionally handled by
      # formal-aggregate-publisher.yml from trusted workflow_run or manual
      # workflow_dispatch code. Keep this reusable aggregation workflow read-only
      # because workflow_call executions can originate from pull_request runs.
