name: Copilot Auto Fix

on:
  pull_request_review:
    types: [submitted]

env:
  AI_REVIEW_ACTORS: ${{ vars.AI_REVIEW_ACTORS || '' }}
  COPILOT_ACTORS: ${{ vars.COPILOT_ACTORS || '' }}

concurrency:
  group: copilot-auto-fix-${{ github.event.pull_request.number }}-${{ github.actor }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  auto-fix:
    if: >-
      !contains(fromJSON('["1","true","yes","on","TRUE","YES","ON","True","Yes","On"]'), vars.AE_AUTOMATION_GLOBAL_DISABLE)
      && !(
        vars.AE_CODEX_AUTOPILOT_ENABLED == '1'
        && contains(github.event.pull_request.labels.*.name, 'autopilot:on')
      )
      && github.event.pull_request.head.repo.fork == false
      && (
        contains(fromJSON('["copilot-pull-request-reviewer","github-copilot","github-copilot[bot]","copilot","copilot[bot]","chatgpt-codex-connector","chatgpt-codex-connector[bot]","Copilot"]'), github.actor)
        || contains(format(',{0},', vars.AI_REVIEW_ACTORS || ''), format(',{0},', github.actor))
        || contains(format(',{0},', vars.COPILOT_ACTORS || ''), format(',{0},', github.actor))
      )
    runs-on: ubuntu-latest
    # This job can write to the same-repository PR branch, so execute only
    # trusted automation code from the base commit and treat the PR checkout as
    # data with persisted credentials disabled.
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout trusted automation code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: trusted
          fetch-depth: 0
          persist-credentials: false
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Resolve automation config
        env:
          AE_AUTOMATION_PROFILE: ${{ vars.AE_AUTOMATION_PROFILE || '' }}
          AI_REVIEW_ACTORS: ${{ vars.AI_REVIEW_ACTORS || '' }}
          COPILOT_ACTORS: ${{ vars.COPILOT_ACTORS || '' }}
          AE_COPILOT_AUTO_FIX: ${{ vars.AE_COPILOT_AUTO_FIX || '' }}
          AE_COPILOT_AUTO_FIX_SCOPE: ${{ vars.AE_COPILOT_AUTO_FIX_SCOPE || '' }}
          AE_COPILOT_AUTO_FIX_LABEL: ${{ vars.AE_COPILOT_AUTO_FIX_LABEL || '' }}
          AE_AUTO_MERGE: ${{ vars.AE_AUTO_MERGE || '' }}
          AE_AUTO_MERGE_MODE: ${{ vars.AE_AUTO_MERGE_MODE || '' }}
          AE_AUTO_MERGE_LABEL: ${{ vars.AE_AUTO_MERGE_LABEL || '' }}
          AE_AUTO_MERGE_REQUIRE_RISK_LOW: ${{ vars.AE_AUTO_MERGE_REQUIRE_RISK_LOW || '' }}
          AE_AUTO_MERGE_REQUIRE_CHANGE_PACKAGE: ${{ vars.AE_AUTO_MERGE_REQUIRE_CHANGE_PACKAGE || '' }}
          AE_AUTO_MERGE_CHANGE_PACKAGE_ALLOW_WARN: ${{ vars.AE_AUTO_MERGE_CHANGE_PACKAGE_ALLOW_WARN || '' }}
          AE_GH_THROTTLE_MS: ${{ vars.AE_GH_THROTTLE_MS || '' }}
          AE_GH_RETRY_MAX_ATTEMPTS: ${{ vars.AE_GH_RETRY_MAX_ATTEMPTS || '' }}
          AE_GH_RETRY_INITIAL_DELAY_MS: ${{ vars.AE_GH_RETRY_INITIAL_DELAY_MS || '' }}
          AE_GH_RETRY_MAX_DELAY_MS: ${{ vars.AE_GH_RETRY_MAX_DELAY_MS || '' }}
          AE_GH_RETRY_MULTIPLIER: ${{ vars.AE_GH_RETRY_MULTIPLIER || '' }}
          AE_GH_RETRY_JITTER_MS: ${{ vars.AE_GH_RETRY_JITTER_MS || '' }}
          AE_GH_RETRY_DEBUG: ${{ vars.AE_GH_RETRY_DEBUG || '' }}
          COPILOT_REVIEW_WAIT_MINUTES: ${{ vars.COPILOT_REVIEW_WAIT_MINUTES || '' }}
          COPILOT_REVIEW_MAX_ATTEMPTS: ${{ vars.COPILOT_REVIEW_MAX_ATTEMPTS || '' }}
        run: |
          node trusted/scripts/ci/lib/automation-config.mjs --format github-env >> "$GITHUB_ENV"
          node trusted/scripts/ci/lib/automation-config.mjs --format summary >> "$GITHUB_STEP_SUMMARY"
      - name: Checkout PR head workspace
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          path: pr
          fetch-depth: 0
          persist-credentials: false
      - name: Apply Copilot suggestions
        working-directory: pr
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: node ../trusted/scripts/ci/copilot-auto-fix.mjs
