name: Release
on:
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Ensure quality gates pass before release
  quality-check:
    name: Quality Check
    uses: ./.github/workflows/quality-gates-centralized.yml
    with:
      environment: production

  # Run fast CI tests
  ci-check:
    name: CI Check  
    uses: ./.github/workflows/ci-fast.yml

  # Verify traceability artifacts
  verify-check:
    name: Verify Traceability
    uses: ./.github/workflows/verify.yml

  # Main release job - only runs if quality and CI checks pass
  release:
    runs-on: ubuntu-latest
    needs: [quality-check, ci-check, verify-check]
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - uses: actions/checkout@v4
      - name: Detect container manifest
        id: container_manifest
        uses: ./.github/actions/detect-container-manifest
      - name: Setup Node + pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          node-version: 22
      - name: Install dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile
      - run: pnpm run build

      - name: Bin smoke check
        run: node scripts/ci/check-bins.mjs
      
      - name: Generate SBOM
        run: |
          SYFT_VERSION="1.33.0"
          SYFT_TAR="syft_${SYFT_VERSION}_linux_amd64.tar.gz"
          SYFT_CHECKSUMS="syft_${SYFT_VERSION}_checksums.txt"
          curl -fsSLO "https://github.com/anchore/syft/releases/download/v${SYFT_VERSION}/${SYFT_TAR}"
          curl -fsSLO "https://github.com/anchore/syft/releases/download/v${SYFT_VERSION}/${SYFT_CHECKSUMS}"
          grep "${SYFT_TAR}" "${SYFT_CHECKSUMS}" | sha256sum --check --status
          tar -xzf "${SYFT_TAR}" syft
          ./syft packages dir:. -o cyclonedx-json > sbom.json
          rm -f "${SYFT_TAR}" "${SYFT_CHECKSUMS}" syft
      - name: Attest SBOM release asset
        id: attest_sbom
        uses: actions/attest@v4
        with:
          subject-path: sbom.json
      - name: Stage SBOM attestation bundle
        run: |
          mkdir -p security/sigstore
          cp "${{ steps.attest_sbom.outputs.bundle-path }}" security/sigstore/sbom.intoto.jsonl
      - name: Install Podman
        if: steps.container_manifest.outputs.skip != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y podman
          podman version
      - name: Build container image
        if: steps.container_manifest.outputs.skip != 'true'
        run: |
          podman build -f "${{ steps.container_manifest.outputs.dockerfile }}" -t ${{ github.repository }}:${{ github.ref_name }} .
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            sbom.json
            security/sigstore/sbom.intoto.jsonl
          generate_release_notes: true
      
      - name: Deploy Canary
        run: |
          printf "%s\n" "Deploying canary version..."
          # Placeholder for canary deployment

  release-quality-artifacts:
    name: Release Quality Artifacts
    needs: release
    uses: ./.github/workflows/release-quality-artifacts.yml
    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write
    secrets: inherit
