name: ae-2409-local-stack

services:
  nats:
    image: nats:2.11-alpine
    command:
      - "-js"
      - "-sd"
      - "/data"
      - "-m"
      - "8222"
    ports:
      - "${NATS_CLIENT_PORT:-14222}:4222"
      - "${NATS_MONITOR_PORT:-18222}:8222"
    volumes:
      - nats-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8222/healthz || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ae_local}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ae_local_password}
      POSTGRES_DB: ${POSTGRES_DB:-ae_local}
    ports:
      - "${POSTGRES_PORT:-15432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-ae_local} -d ${POSTGRES_DB:-ae_local} -h localhost -p 5432",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio:
    image: minio/minio:RELEASE.2025-09-16T01-00-00Z
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-ae_local}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-ae_local_password}
    ports:
      - "${MINIO_API_PORT:-19000}:9000"
      - "${MINIO_CONSOLE_PORT:-19001}:9001"
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:RELEASE.2025-09-17T20-08-00Z
    depends_on:
      - minio
    restart: "no"
    entrypoint: ["/bin/sh", "-ec"]
    command: |
      until mc alias set local http://minio:9000 "${MINIO_ROOT_USER:-ae_local}" "${MINIO_ROOT_PASSWORD:-ae_local_password}" >/dev/null 2>&1; do
        sleep 1
      done
      mc mb --ignore-existing "local/${MINIO_BUCKET:-ae-local-poc}" >/dev/null
      echo "MinIO bootstrap completed for bucket: ${MINIO_BUCKET:-ae-local-poc}"

volumes:
  nats-data:
  postgres-data:
  minio-data:
