# Template: copy to .github/workflows/spec-kit-min.yml
name: Spec Kit Minimal

on:
  workflow_dispatch:

jobs:
  spec-kit-min:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Activate minimum Spec & Verification Kit profile
        run: pnpm run spec-kit-min:verify -- --run-custom-suites
      - name: Upload activation summary
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: spec-kit-min-activation-summary
          path: artifacts/spec-kit-min/**
